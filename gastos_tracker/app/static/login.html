<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gastos Tracker CL — Ingresar</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <span class="text-5xl">💰</span>
      <h1 class="text-2xl font-bold text-gray-900 mt-3">Gastos Tracker CL</h1>
      <p class="text-gray-500 text-sm mt-1">Ingresa para continuar</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
          <input id="username" type="text" required autocomplete="username"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
          <input id="password" type="password" required autocomplete="current-password"
            class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <p id="error-msg" class="text-red-500 text-sm hidden"></p>
        <button type="submit" id="btn-login"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-lg py-2.5 font-semibold text-sm transition-colors">
          Ingresar
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      ¿Primera vez? Pide al administrador que cree tu cuenta.
    </p>
  </div>

  <script>
    if (localStorage.getItem('token')) window.location = '/ui';

    document.getElementById('login-form').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const err = document.getElementById('error-msg');
      btn.disabled = true;
      btn.textContent = 'Ingresando…';
      err.classList.add('hidden');

      const body = new URLSearchParams();
      body.append('username', document.getElementById('username').value.trim());
      body.append('password', document.getElementById('password').value);

      try {
        const res = await fetch('/auth/login', { method: 'POST', body });
        if (res.ok) {
          const data = await res.json();
          localStorage.setItem('token', data.access_token);
          window.location = '/ui';
        } else {
          err.textContent = 'Usuario o contraseña incorrectos';
          err.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'Ingresar';
        }
      } catch {
        err.textContent = 'Error de conexión con el servidor';
        err.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    };
  </script>

</body>
</html>
